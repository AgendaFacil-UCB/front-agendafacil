<!-- src/views/servicos/lista.html -->
<div class="af-page">
  <div class="af-page-header">
    <div>
      <h1>Serviços disponíveis</h1>
      <p>Encontre e agende os serviços que você procura.</p>
    </div>
  </div>

  {{#servicos}}
    <div class="af-servico-card">
      <div style="display:flex;align-items:center;gap:16px;flex:1;min-width:0;">
        <div class="af-list-icon i0" style="flex-shrink:0;"><i class="ti ti-briefcase" aria-hidden="true"></i></div>
        <div class="af-servico-info">
          <h5>{{nome}}</h5>
          <p>{{descricao}}</p>
          <div class="af-servico-meta">
            <span><i class="ti ti-user"></i> {{prestador.nome}}</span>
            <span><i class="ti ti-tag"></i> {{categoria.nome}}</span>
            <span><i class="ti ti-clock"></i> {{duracao}} min</span>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0;">
        <p class="af-servico-price">R$ {{preco}}</p>
        <a href="/servicos/{{id}}" class="af-btn af-btn-primary af-btn-sm"><i class="ti ti-calendar-plus"></i> Ver detalhes</a>
      </div>
    </div>
  {{/servicos}}

  {{^servicos}}
    <div class="af-card">
      <div class="af-empty">
        <i class="ti ti-briefcase-off" aria-hidden="true"></i>
        <p>Nenhum serviço disponível no momento.</p>
      </div>
    </div>
  {{/servicos}}
</div>
