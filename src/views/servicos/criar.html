<!-- src/views/servicos/criar.html -->
<div class="af-page">
  <div class="af-page-header">
    <div>
      <h1>Cadastrar serviço</h1>
      <p>Preencha os dados abaixo para disponibilizar seu serviço para agendamento.</p>
    </div>
    <a href="/servicos" class="af-btn af-btn-outline"><i class="ti ti-arrow-left"></i> Voltar</a>
  </div>

  <div style="max-width:760px;">
    {{#errors}}
      <div class="af-alert af-alert-danger"><i class="ti ti-alert-circle"></i> {{msg}}</div>
    {{/errors}}

    <div class="af-card">
      <form method="POST" action="/servicos">

        <div class="af-form-section">
          <p class="af-form-section-title">Informações básicas</p>
          <div class="af-fg-row col3">
            <div class="af-fg">
              <label for="nome">Nome do serviço</label>
              <input type="text" id="nome" name="nome" placeholder="Ex: Corte de cabelo masculino" required>
            </div>
            <div class="af-fg" style="grid-column:span 1;">
              <label for="categoria_id">Categoria</label>
              <select id="categoria_id" name="categoria_id" required>
                <option value="">Selecione…</option>
                {{#categorias}}
                  <option value="{{id}}">{{nome}}</option>
                {{/categorias}}
              </select>
            </div>
          </div>
          <div class="af-fg">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" placeholder="Conte o que está incluído neste serviço…"></textarea>
          </div>
        </div>

        <div class="af-form-section">
          <p class="af-form-section-title">Preço e duração</p>
          <div class="af-fg-row col2">
            <div class="af-fg">
              <label for="preco">Preço (R$)</label>
              <input type="number" step="0.01" min="0" id="preco" name="preco" placeholder="0,00" required>
            </div>
            <div class="af-fg">
              <label for="duracao">Duração (minutos)</label>
              <input type="number" min="1" id="duracao" name="duracao" placeholder="Ex: 60" required>
            </div>
          </div>
        </div>

        <div class="af-form-section">
          <p class="af-form-section-title">Disponibilidade</p>
          <div class="af-fg">
            <label>Dias de funcionamento</label>
            <div class="af-checks">
              <label class="af-check-label"><input type="checkbox" name="dias" value="1"> Segunda</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="2"> Terça</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="3"> Quarta</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="4"> Quinta</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="5"> Sexta</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="6"> Sábado</label>
              <label class="af-check-label"><input type="checkbox" name="dias" value="0"> Domingo</label>
            </div>
          </div>
          <div class="af-fg-row col2" style="margin-top:16px;">
            <div class="af-fg">
              <label for="hora_inicio">Hora de início</label>
              <input type="time" id="hora_inicio" name="hora_inicio" required>
            </div>
            <div class="af-fg">
              <label for="hora_fim">Hora de término</label>
              <input type="time" id="hora_fim" name="hora_fim" required>
            </div>
          </div>
        </div>

        <div style="display:flex;justify-content:flex-end;gap:10px;padding-top:8px;">
          <a href="/servicos" class="af-btn af-btn-outline">Cancelar</a>
          <button type="submit" class="af-btn af-btn-primary"><i class="ti ti-check"></i> Criar serviço</button>
        </div>
      </form>
    </div>
  </div>
</div>
