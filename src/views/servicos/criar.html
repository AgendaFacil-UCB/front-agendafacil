<div class="container">

  <div class="af-page-header">
    <span class="eyebrow">Novo serviço</span>
    <h1>Cadastre um serviço</h1>
    <p>Preencha os dados abaixo para disponibilizar seu serviço para agendamento.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-9">

      {{#errors}}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          {{msg}}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {{/errors}}

      <div class="card">
        <div class="card-body af-form-card">
          <form method="POST" action="/servicos">

            <div class="af-form-section">
              <div class="section-title">Informações básicas</div>
              <div class="row g-3">
                <div class="col-md-8">
                  <label for="nome" class="form-label">Nome do serviço</label>
                  <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Corte de cabelo masculino" required>
                </div>
                <div class="col-md-4">
                  <label for="categoria_id" class="form-label">Categoria</label>
                  <select class="form-select" id="categoria_id" name="categoria_id" required>
                    <option value="">Selecione…</option>
                    {{#categorias}}
                      <option value="{{id}}">{{nome}}</option>
                    {{/categorias}}
                  </select>
                </div>
                <div class="col-12">
                  <label for="descricao" class="form-label">Descrição</label>
                  <textarea class="form-control" id="descricao" name="descricao" rows="4" placeholder="Conte o que está incluído neste serviço…"></textarea>
                </div>
              </div>
            </div>

            <div class="af-form-section">
              <div class="section-title">Preço e duração</div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="preco" class="form-label">Preço (R$)</label>
                  <input type="number" step="0.01" min="0" class="form-control" id="preco" name="preco" placeholder="0,00" required>
                </div>
                <div class="col-md-6">
                  <label for="duracao" class="form-label">Duração (minutos)</label>
                  <input type="number" min="1" class="form-control" id="duracao" name="duracao" placeholder="Ex: 60" required>
                </div>
              </div>
            </div>

            <div class="af-form-section">
              <div class="section-title">Disponibilidade</div>

              <div class="mb-3">
                <label class="form-label">Dias de funcionamento</label>
                <div class="d-flex flex-wrap gap-2">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="1" id="dia_1">
                    <label class="form-check-label" for="dia_1">Segunda</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="2" id="dia_2">
                    <label class="form-check-label" for="dia_2">Terça</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="3" id="dia_3">
                    <label class="form-check-label" for="dia_3">Quarta</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="4" id="dia_4">
                    <label class="form-check-label" for="dia_4">Quinta</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="5" id="dia_5">
                    <label class="form-check-label" for="dia_5">Sexta</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="6" id="dia_6">
                    <label class="form-check-label" for="dia_6">Sábado</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="dias" value="0" id="dia_0">
                    <label class="form-check-label" for="dia_0">Domingo</label>
                  </div>
                </div>
              </div>

              <div class="row g-3">
                <div class="col-md-6">
                  <label for="hora_inicio" class="form-label">Hora de início</label>
                  <input type="time" class="form-control" id="hora_inicio" name="hora_inicio" required>
                </div>
                <div class="col-md-6">
                  <label for="hora_fim" class="form-label">Hora de término</label>
                  <input type="time" class="form-control" id="hora_fim" name="hora_fim" required>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
              <a href="/servicos" class="btn btn-outline-secondary">Cancelar</a>
              <button type="submit" class="btn btn-primary">Criar serviço</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
