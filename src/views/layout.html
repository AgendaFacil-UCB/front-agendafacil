<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — AgendaFácil</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="af-nav">
  <div class="af-nav-inner">
    <a class="af-logo" href="/">
      <div class="af-logo-icon"><i class="ti ti-calendar-check"></i></div>
      AgendaFácil
    </a>
    <div class="af-nav-links">
      <a href="/servicos">Serviços</a>
      {{#usuario}}
        {{#isCliente}}
          <a href="/painel/cliente">Painel</a>
          <a href="/agendamentos/meus-agendamentos">Meus Agendamentos</a>
        {{/isCliente}}
        {{#isPrestador}}
          <a href="/painel/prestador">Painel</a>
          <a href="/servicos/criar">Novo Serviço</a>
          <a href="/agendamentos/agendamentos-prestador">Agendamentos</a>
        {{/isPrestador}}
        <div class="af-user-drop">
          <button class="af-user-btn">
            <span class="af-user-av">{{usuario.nome}}</span>
            <i class="ti ti-chevron-down"></i>
          </button>
          <div class="af-drop-menu">
            <a href="/autenticacao/sair"><i class="ti ti-logout"></i> Sair</a>
          </div>
        </div>
      {{/usuario}}
      {{^usuario}}
        <a href="/autenticacao/entrar" class="af-nav-plain">Entrar</a>
        <a href="/autenticacao/cadastro" class="af-nav-cta">Criar conta</a>
      {{/usuario}}
    </div>
  </div>
</nav>

<main>{{{body}}}</main>

<footer class="af-footer">
  <div class="af-footer-inner">
    <div class="af-logo" style="color:#64748b;">
      <div class="af-logo-icon" style="background:#1e293b;box-shadow:none;">
        <i class="ti ti-calendar-check" style="color:#64748b;"></i>
      </div>
      AgendaFácil
    </div>
    <p>&copy; 2026 AgendaFácil — Todos os direitos reservados.</p>
  </div>
</footer>

<script src="/js/main.js"></script>
</body>
</html>
