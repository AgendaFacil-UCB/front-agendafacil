<!-- src/views/autenticacao/entrar.html -->
<div class="af-auth-wrap">
  <div class="af-auth-split">

    <div class="af-auth-visual dark" id="auth-visual">
      <div class="af-auth-visual-icon"><i class="ti ti-calendar-check" aria-hidden="true"></i></div>
      <h2 id="auth-visual-title">Bem-vindo de volta</h2>
      <p id="auth-visual-desc">Acesse sua conta e gerencie seus agendamentos com facilidade e praticidade.</p>
      <div class="af-auth-visual-badge">
        <i class="ti ti-shield-check"></i> Acesso seguro e criptografado
      </div>
    </div>

    <div class="af-auth-form-side">
      <h3>Entrar na conta</h3>
      <p class="af-sub">Preencha seus dados para continuar</p>

      {{#errors}}
        <div class="af-alert af-alert-danger"><i class="ti ti-alert-circle"></i> {{msg}}</div>
      {{/errors}}

      <form method="POST" action="/autenticacao/entrar">
        <div class="af-fg">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required>
        </div>
        <div class="af-fg">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="af-btn af-btn-primary af-btn-block" style="padding:13px;margin-top:4px;">
          <i class="ti ti-login"></i> Entrar
        </button>
      </form>

      <p style="text-align:center;font-size:13px;color:#6b7ab5;margin-top:20px;">
        Não tem conta? <a href="/autenticacao/cadastro" style="color:#4f7ce8;font-weight:600;">Cadastre-se aqui</a>
      </p>
    </div>

  </div>
</div>
