<div class="container">
  <div class="card af-auth-card shadow">
    <div class="card-body">
      <h2 class="text-center">Bem-vindo de volta</h2>
      <p class="subtitle">Entre na sua conta para continuar</p>

      {{#errors}}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          <strong>Erro:</strong> {{msg}}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {{/errors}}

      <form method="POST" action="/autenticacao/entrar">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha" name="senha" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar</button>
      </form>

      <div class="text-center mt-4">
        <p class="small text-muted mb-0">Não tem conta? <a href="/autenticacao/cadastro" class="text-decoration-none">Cadastre-se aqui</a></p>
      </div>
    </div>
  </div>
</div>
